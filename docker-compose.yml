name: nebulaproxy

# ─── Isolated bridge network — no container runs on the host network ──────────
networks:
  nebula-net:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.20.0.0/16
        - subnet: fd00:db8:1::/48

services:

  # ── Docker socket proxy (read-only) ────────────────────────────────────────
  # Backend monitoring only — no POST, no BUILD. Cannot create/stop/modify containers.
  socket-proxy-ro:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: nebulaproxy-socket-proxy-ro
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      NETWORKS: 1
      VOLUMES: 1
    ports:
      - "127.0.0.1:2375:2375"   # accessible depuis le backend en network_mode host
    networks:
      - nebula-net
    deploy:
      resources:
        limits:
          memory: 64M

  # ── Docker socket proxy (read-write) ────────────────────────────────────────
  # Watchdog only — POST + BUILD required to rebuild and restart containers on update.
  # Not published on host, accessible only via nebula-net.
  socket-proxy-rw:
    image: tecnativa/docker-socket-proxy:0.3.0
    container_name: nebulaproxy-socket-proxy-rw
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      IMAGES: 1
      BUILD: 1
      POST: 1
      INFO: 1
      NETWORKS: 1
      VOLUMES: 1
    networks:
      - nebula-net
    deploy:
      resources:
        limits:
          memory: 64M

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    build:
      context: ./redis
      dockerfile: Dockerfile
    container_name: nebulaproxy-redis
    volumes:
      - redis-data:/data
      - redis-secret:/run/redis-secret  # secret also written here for sibling containers
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"   # accessible depuis le backend en host network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $(cat /data/redis.secret) --no-auth-warning ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - nebula-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    container_name: nebulaproxy-postgres
    volumes:
      - pg-data:/var/lib/postgresql/data
      - pg-secret:/run/pg-secret  # auto-generated password exposed to backend (read-only)
    environment:
      POSTGRES_USER: nebulaproxy
      POSTGRES_DB: nebulaproxy
      # POSTGRES_PASSWORD_FILE is set by the custom entrypoint
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"   # accessible depuis le backend en host network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nebulaproxy -d nebulaproxy"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nebula-net
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ── Backend ────────────────────────────────────────────────────────────────
  # SECURITY NOTE: network_mode: host is required because the proxy must bind
  # to arbitrary TCP/UDP ports at runtime (80, 443, custom game ports, etc.).
  # Mitigation: drop all unneeded Linux capabilities and prevent privilege
  # escalation. The proxy only needs NET_BIND_SERVICE (ports < 1024).
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nebulaproxy-backend
    env_file:
      - path: .env.nebula
        required: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE    # bind to ports < 1024 (80, 443)
      - CHOWN              # write let's encrypt certs
      - DAC_OVERRIDE       # read/write cert files as non-root
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/letsencrypt:/var/www/letsencrypt
      # Optional: mount an extra .well-known from another service (e.g. mailcow).
      # Add this line to a docker-compose.override.yml if needed:
      #   - /opt/mailcow-dockerized/data/web/.well-known:/var/www/letsencrypt/.well-known
      - /etc/NebulaProxy:/repo
      - backups:/app/backups
      - uploads:/app/uploads
      - redis-secret:/run/redis-secret:ro
      - pg-secret:/run/pg-secret:ro
    environment:
      - GIT_DIR=/repo/.git
      - REPO_PATH=/repo
      - COMPOSE_PROJECT_NAME=nebulaproxy
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
      - DB_HOST=127.0.0.1
      - DB_PORT=5432
      - DB_USER=nebulaproxy
      - DB_NAME=nebulaproxy
      - DOCKER_HOST=tcp://127.0.0.1:2375
      - PUBLIC_IP=${PUBLIC_IP:-}
      - PUBLIC_IPV6=${PUBLIC_IPV6:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      socket-proxy-ro:
        condition: service_started
    # host network = expose TOUS les ports dynamiquement (TCP/UDP domaines, 80, 443, 3000, 25565, SMTP...)
    # Aucun port n'a besoin d'être listé — tout ce que le backend écoute est accessible sur l'hôte.
    network_mode: host
    stop_signal: SIGTERM
    stop_grace_period: 45s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1024M
        reservations:
          cpus: '0.2'
          memory: 256M

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nebulaproxy-frontend
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE    # nginx binds port 80
      - CHOWN               # nginx needs to chown its cache dirs at startup
      - SETUID              # nginx drops privileges from root → nginx user
      - SETGID
    ports:
      - "0.0.0.0:3001:80"
      - "[::]:3001:80"
    extra_hosts:
      - "backend:host-gateway"   # résout 'backend' vers l'hôte (backend en network_mode host)
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nebula-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M

  # ── Watchdog ───────────────────────────────────────────────────────────────
  watchdog:
    build:
      context: ./watchdog
      dockerfile: Dockerfile
    container_name: nebulaproxy-watchdog
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    volumes:
      - /etc/NebulaProxy:/repo
      - watchdog-logs:/var/log
      - redis-secret:/run/redis-secret:ro
    environment:
      - REPO_PATH=/repo
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DOCKER_HOST=tcp://socket-proxy-rw:2375
      - COMPOSE_PROJECT_NAME=nebulaproxy
    healthcheck:
      test: ["CMD-SHELL", "find /tmp/watchdog.heartbeat -mmin -2 | grep -q ."]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
      socket-proxy-rw:
        condition: service_started
    networks:
      - nebula-net

volumes:
  redis-data:
    driver: local
  redis-secret:
    driver: local
  pg-data:
    driver: local
  pg-secret:
    driver: local
  backups:
    driver: local
  uploads:
    driver: local
  watchdog-logs:
    driver: local
