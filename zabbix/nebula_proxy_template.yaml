zabbix_export:
  version: '6.0'
  date: '2026-05-27T00:00:00Z'

  groups:
    - uuid: a571c0d144b14fd4a87a9d9b2aa9fcd6
      name: Templates/Applications

  templates:
    - uuid: 3b6e2f1a0d4c4e8a9f7b2c5d8e1f3a6b
      template: NebulaProxy
      name: NebulaProxy
      description: |
        Monitors NebulaProxy reverse proxy — domain health, SSL certificates,
        system resources, and proxy lifecycle via Zabbix Sender (trapper items).

        Requirements:
          - NebulaProxy >= current version with Zabbix integration enabled
          - Zabbix Sender active on NebulaProxy side (Admin → Zabbix)
          - Set {$NEBULA_URL} to your NebulaProxy base URL for LLD discovery

        Trapper keys pushed by NebulaProxy:
          nebula.proxy.status
          nebula.system.cpu / memory / disk
          nebula.domain.status[<hostname>]
          nebula.domain.response_time[<hostname>]
          nebula.ssl.expires_in[<hostname>]

      groups:
        - name: Templates/Applications

      macros:
        - macro: '{$NEBULA_URL}'
          value: 'http://localhost:8080'
          description: 'NebulaProxy base URL used for domain LLD (e.g. https://proxy.example.com)'
        - macro: '{$CPU.UTIL.WARN}'
          value: '80'
          description: 'CPU warning threshold (%)'
        - macro: '{$CPU.UTIL.CRIT}'
          value: '95'
          description: 'CPU critical threshold (%)'
        - macro: '{$MEM.UTIL.WARN}'
          value: '85'
          description: 'Memory warning threshold (%)'
        - macro: '{$MEM.UTIL.CRIT}'
          value: '95'
          description: 'Memory critical threshold (%)'
        - macro: '{$DISK.UTIL.WARN}'
          value: '85'
          description: 'Disk warning threshold (%)'
        - macro: '{$DISK.UTIL.CRIT}'
          value: '95'
          description: 'Disk critical threshold (%)'
        - macro: '{$SSL.EXPIRY.WARN}'
          value: '14'
          description: 'SSL certificate warning threshold (days)'
        - macro: '{$SSL.EXPIRY.CRIT}'
          value: '3'
          description: 'SSL certificate critical threshold (days)'

      # ----------------------------------------------------------------
      # System-level items (Zabbix trapper — pushed by NebulaProxy)
      # ----------------------------------------------------------------
      items:
        - uuid: c1a2b3d4e5f6a7b8c9d0e1f2a3b4c5d6
          name: 'Proxy Status'
          key: nebula.proxy.status
          type: TRAP
          value_type: UNSIGNED
          description: '1 = running, 0 = stopped/unreachable'
          valuemap:
            name: 'NebulaProxy Service State'
          tags:
            - tag: component
              value: proxy
          triggers:
            - uuid: d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6
              expression: 'last(/NebulaProxy/nebula.proxy.status)=0'
              name: 'NebulaProxy is DOWN'
              priority: HIGH
              description: 'The NebulaProxy service stopped sending data or has been shut down.'
              manual_close: 'YES'

        - uuid: e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6
          name: 'CPU Usage'
          key: nebula.system.cpu
          type: TRAP
          value_type: FLOAT
          units: '%'
          description: 'CPU usage percentage reported by NebulaProxy'
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6
              expression: 'last(/NebulaProxy/nebula.system.cpu)>{$CPU.UTIL.CRIT}'
              name: 'Critical CPU usage on NebulaProxy ({ITEM.LASTVALUE})'
              priority: HIGH
              description: 'CPU usage has exceeded the critical threshold.'
            - uuid: a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7
              expression: >-
                last(/NebulaProxy/nebula.system.cpu)>{$CPU.UTIL.WARN}
                and last(/NebulaProxy/nebula.system.cpu)<={$CPU.UTIL.CRIT}
              name: 'High CPU usage on NebulaProxy ({ITEM.LASTVALUE})'
              priority: WARNING

        - uuid: b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8
          name: 'Memory Usage'
          key: nebula.system.memory
          type: TRAP
          value_type: FLOAT
          units: '%'
          description: 'Memory usage percentage reported by NebulaProxy'
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9
              expression: 'last(/NebulaProxy/nebula.system.memory)>{$MEM.UTIL.CRIT}'
              name: 'Critical memory usage on NebulaProxy ({ITEM.LASTVALUE})'
              priority: HIGH
            - uuid: d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0
              expression: >-
                last(/NebulaProxy/nebula.system.memory)>{$MEM.UTIL.WARN}
                and last(/NebulaProxy/nebula.system.memory)<={$MEM.UTIL.CRIT}
              name: 'High memory usage on NebulaProxy ({ITEM.LASTVALUE})'
              priority: WARNING

        - uuid: e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1
          name: 'Disk Usage'
          key: nebula.system.disk
          type: TRAP
          value_type: FLOAT
          units: '%'
          description: 'Disk usage percentage reported by NebulaProxy'
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2
              expression: 'last(/NebulaProxy/nebula.system.disk)>{$DISK.UTIL.CRIT}'
              name: 'Critical disk usage on NebulaProxy ({ITEM.LASTVALUE})'
              priority: HIGH
            - uuid: a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3
              expression: >-
                last(/NebulaProxy/nebula.system.disk)>{$DISK.UTIL.WARN}
                and last(/NebulaProxy/nebula.system.disk)<={$DISK.UTIL.CRIT}
              name: 'High disk usage on NebulaProxy ({ITEM.LASTVALUE})'
              priority: WARNING

      # ----------------------------------------------------------------
      # Graphs
      # ----------------------------------------------------------------
      graphs:
        - uuid: b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4
          name: 'NebulaProxy System Resources'
          graph_items:
            - color: EF4444
              item:
                host: NebulaProxy
                key: nebula.system.cpu
            - color: F59E0B
              sortorder: '1'
              item:
                host: NebulaProxy
                key: nebula.system.memory
            - color: 10B981
              sortorder: '2'
              item:
                host: NebulaProxy
                key: nebula.system.disk

      # ----------------------------------------------------------------
      # LLD: auto-discover domains via NebulaProxy HTTP endpoint
      # ----------------------------------------------------------------
      discovery_rules:
        - uuid: c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5
          name: 'Domain Discovery'
          key: nebula.domains.discovery
          type: HTTP_AGENT
          url: '{$NEBULA_URL}/api/zabbix/lld/domains'
          delay: 1h
          description: >
            Polls NebulaProxy's LLD endpoint every hour to discover active domains.
            Requires {$NEBULA_URL} to be set to the NebulaProxy base URL.

          item_prototypes:
            - uuid: d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6
              name: 'Domain [{#DOMAIN}] Status'
              key: 'nebula.domain.status[{#DOMAIN}]'
              type: TRAP
              value_type: UNSIGNED
              description: '1 = healthy/up, 0 = down'
              valuemap:
                name: 'NebulaProxy Domain State'
              tags:
                - tag: component
                  value: domain
                - tag: domain
                  value: '{#DOMAIN}'

            - uuid: e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7
              name: 'Domain [{#DOMAIN}] Response Time'
              key: 'nebula.domain.response_time[{#DOMAIN}]'
              type: TRAP
              value_type: FLOAT
              units: ms
              description: 'Average backend response time in milliseconds'
              tags:
                - tag: component
                  value: domain
                - tag: domain
                  value: '{#DOMAIN}'

            - uuid: f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8
              name: 'SSL [{#DOMAIN}] Days Until Expiry'
              key: 'nebula.ssl.expires_in[{#DOMAIN}]'
              type: TRAP
              value_type: UNSIGNED
              units: d
              description: 'Number of days before the SSL certificate expires'
              tags:
                - tag: component
                  value: ssl
                - tag: domain
                  value: '{#DOMAIN}'

          trigger_prototypes:
            - uuid: a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9
              expression: 'last(/NebulaProxy/nebula.domain.status[{#DOMAIN}])=0'
              name: 'Domain [{#DOMAIN}] is DOWN'
              priority: HIGH
              description: 'NebulaProxy health check detected this domain as unreachable.'
              manual_close: 'YES'
              tags:
                - tag: component
                  value: domain

            - uuid: b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0
              expression: >-
                last(/NebulaProxy/nebula.domain.response_time[{#DOMAIN}])>2000
              name: 'Domain [{#DOMAIN}] high response time ({ITEM.LASTVALUE})'
              priority: WARNING
              description: 'Backend response time exceeded 2 seconds.'
              tags:
                - tag: component
                  value: domain

            - uuid: c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1
              expression: >-
                last(/NebulaProxy/nebula.ssl.expires_in[{#DOMAIN}])<{$SSL.EXPIRY.CRIT}
              name: 'SSL [{#DOMAIN}] expires in less than {$SSL.EXPIRY.CRIT} days'
              priority: HIGH
              description: 'SSL certificate is about to expire. Renew immediately.'
              tags:
                - tag: component
                  value: ssl

            - uuid: d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2
              expression: >-
                last(/NebulaProxy/nebula.ssl.expires_in[{#DOMAIN}])<{$SSL.EXPIRY.WARN}
                and last(/NebulaProxy/nebula.ssl.expires_in[{#DOMAIN}])>={$SSL.EXPIRY.CRIT}
              name: 'SSL [{#DOMAIN}] expires in less than {$SSL.EXPIRY.WARN} days'
              priority: WARNING
              description: 'SSL certificate expiry is approaching.'
              tags:
                - tag: component
                  value: ssl

          graph_prototypes:
            - uuid: e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3
              name: 'Domain [{#DOMAIN}] Response Time'
              graph_items:
                - color: 3B82F6
                  item:
                    host: NebulaProxy
                    key: 'nebula.domain.response_time[{#DOMAIN}]'

  # ----------------------------------------------------------------
  # Value maps
  # ----------------------------------------------------------------
  value_maps:
    - uuid: f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4
      name: 'NebulaProxy Service State'
      mappings:
        - value: '0'
          newvalue: DOWN
        - value: '1'
          newvalue: UP

    - uuid: a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5
      name: 'NebulaProxy Domain State'
      mappings:
        - value: '0'
          newvalue: DOWN
        - value: '1'
          newvalue: UP
