<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{{title}}</title>
  <style>
    /* Reset */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    table { border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      background-color: #09090b;
      color: #e4e4e7;
      -webkit-font-smoothing: antialiased;
    }

    /* Layout */
    .wrapper  { width: 100%; background-color: #09090b; padding: 48px 16px; }
    .container { max-width: 560px; margin: 0 auto; }

    /* Brand */
    .brand { text-align: center; margin-bottom: 24px; }
    .brand-link { display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
    .brand-dot { width: 6px; height: 6px; border-radius: 50%; background-color: #fafafa; display: inline-block; }
    .brand-name { font-size: 13px; font-weight: 600; letter-spacing: 0.10em; text-transform: uppercase; color: #71717a; }

    /* Card */
    .card { background-color: #111113; border: 1px solid #27272a; border-radius: 10px; overflow: hidden; }
    .card-body { padding: 36px 36px 32px; }

    /* Typography */
    .email-title    { font-size: 18px; font-weight: 600; color: #fafafa; letter-spacing: -0.02em; line-height: 1.3; margin-bottom: 6px; }
    .email-subtitle { font-size: 13px; color: #71717a; line-height: 1.7; margin-bottom: 28px; }

    /* Alert block */
    .alert { border-radius: 7px; border: 1px solid #27272a; background-color: #18181b; padding: 14px 16px; margin-bottom: 24px; }
    .alert-label { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; color: #71717a; }
    .alert p { font-size: 13px; color: #a1a1aa; margin: 0; line-height: 1.6; }

    .alert-danger  { border-color: rgba(239,68,68,0.25);   background-color: rgba(239,68,68,0.05);   }
    .alert-warning { border-color: rgba(245,158,11,0.25);  background-color: rgba(245,158,11,0.05);  }
    .alert-success { border-color: rgba(34,197,94,0.25);   background-color: rgba(34,197,94,0.05);   }
    .alert-info    { border-color: #27272a;                 background-color: #18181b;                }

    .alert-danger  .alert-label { color: #f87171; }
    .alert-warning .alert-label { color: #fbbf24; }
    .alert-success .alert-label { color: #22c55e; }
    .alert-info    .alert-label { color: #a1a1aa; }

    /* Data table */
    .data-table { width: 100%; margin-bottom: 24px; border-collapse: collapse; }
    .data-table tr + tr td { border-top: 1px solid #1f1f23; }
    .data-table td { padding: 10px 0; font-size: 13px; vertical-align: top; line-height: 1.5; }
    .dk { color: #52525b; width: 130px; font-weight: 400; padding-right: 16px; }
    .dv { color: #e4e4e7; font-weight: 500; }

    /* Code / OTP */
    .code-box   { background-color: #09090b; border: 1px solid #27272a; border-radius: 9px; padding: 28px 20px; text-align: center; margin-bottom: 24px; }
    .code-label { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: #3f3f46; margin-bottom: 14px; }
    .code-value { display: block; font-family: 'SF Mono','Cascadia Code','Fira Code','Courier New',monospace; font-size: 34px; font-weight: 700; letter-spacing: 0.22em; color: #fafafa; }
    .code-expiry { display: block; font-size: 12px; color: #3f3f46; margin-top: 12px; }
    .code-expiry strong { color: #fbbf24; font-weight: 500; }

    /* Buttons */
    .btn-row { margin: 24px 0 4px; }
    .btn { display: inline-block; padding: 9px 20px; border-radius: 6px; font-size: 13px; font-weight: 500; text-decoration: none; letter-spacing: -0.01em; margin-right: 8px; margin-bottom: 8px; }
    .btn-primary { background-color: #fafafa; color: #09090b !important; }
    .btn-danger  { background-color: #ef4444; color: #ffffff !important; }
    .btn-ghost   { background-color: transparent; color: #71717a !important; border: 1px solid #27272a; }

    /* Badge */
    .badge { display: inline-block; padding: 2px 9px; border-radius: 99px; font-size: 11px; font-weight: 500; }
    .badge-success { background: rgba(34,197,94,0.10);  color: #22c55e;  border: 1px solid rgba(34,197,94,0.20);  }
    .badge-warning { background: rgba(245,158,11,0.10); color: #fbbf24;  border: 1px solid rgba(245,158,11,0.20); }
    .badge-danger  { background: rgba(239,68,68,0.10);  color: #f87171;  border: 1px solid rgba(239,68,68,0.20);  }
    .badge-info    { background: #18181b;                color: #a1a1aa;  border: 1px solid #27272a;               }
    .badge-muted   { background: #18181b;                color: #52525b;  border: 1px solid #27272a;               }

    /* Note */
    .note { background-color: #18181b; border: 1px solid #27272a; border-radius: 7px; padding: 14px 16px; font-size: 12px; color: #52525b; line-height: 1.75; margin-top: 20px; }
    .note strong { color: #71717a; font-weight: 500; }

    /* Progress bar */
    .progress-wrap  { background-color: #09090b; border: 1px solid #27272a; border-radius: 8px; padding: 16px 18px; margin-bottom: 24px; }
    .progress-track { background-color: #27272a; border-radius: 4px; height: 4px; overflow: hidden; margin-bottom: 9px; }
    .progress-fill  { height: 4px; border-radius: 4px; background-color: #e4e4e7; }
    .progress-meta  { font-size: 12px; color: #52525b; }
    .progress-meta strong { color: #a1a1aa; font-weight: 500; }

    /* Helpers */
    .text-muted   { color: #52525b; }
    .text-danger  { color: #f87171; }
    .text-warning { color: #fbbf24; }
    .text-success { color: #22c55e; }
    .divider { border: none; border-top: 1px solid #1f1f23; margin: 24px 0; }

    /* Footer */
    .footer { text-align: center; padding: 28px 0 0; }
    .footer p { font-size: 12px; color: #3f3f46; line-height: 1.9; }
    .footer a { color: #3f3f46; text-decoration: none; border-bottom: 1px solid #27272a; }

    /* Responsive */
    @media only screen and (max-width: 600px) {
      .wrapper   { padding: 24px 12px; }
      .card-body { padding: 24px 20px 20px; }
      .email-title { font-size: 16px; }
      .code-value  { font-size: 26px; letter-spacing: 0.14em; }
      .dk          { width: 110px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">

      <!-- Brand -->
      <div class="brand">
        <a href="{{dashboardUrl}}" class="brand-link">
          <span class="brand-dot"></span>
          <span class="brand-name">NebulaProxy</span>
        </a>
      </div>

      <!-- Card -->
      <div class="card">
        <div class="card-body">
          {{content}}
        </div>
      </div>

      <!-- Footer -->
      <div class="footer">
        <p>
          You are receiving this because you have an account on NebulaProxy.<br>
          <a href="{{dashboardUrl}}/settings/notifications">Manage notifications</a> &nbsp;&middot;&nbsp;
          <a href="{{dashboardUrl}}">Dashboard</a> &nbsp;&middot;&nbsp;
          <a href="{{supportUrl}}">Support</a>
        </p>
        <p style="margin-top:8px;">&#169; {{year}} NebulaProxy</p>
      </div>

    </div>
  </div>
</body>
</html>
